# SonarCloud Configuration
sonar.organization=jonaldoalix
sonar.projectKey=jonaldoalix_applicant-management-suite
sonar.projectName=applicant-management-suite
sonar.projectVersion=1.0

# 1. Define Source Code (Production)
# Tell Sonar to look in src, but EXCLUDE test files from being treated as source
sonar.sources=src
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/tests/**,**/__tests__/**

# 2. Define Test Code (Explicitly)
# Tell Sonar exactly which files are tests. This fixes the "0% coverage" issue.
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js

# 3. Coverage Reporting
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# 4. Files to ignore for coverage calculations (but still analyze for bugs)
sonar.coverage.exclusions=src/reportWebVitals.js,src/setupTests.js,src/index.js,src/config/**