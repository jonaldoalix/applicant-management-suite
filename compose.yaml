# Optional Docker Compose — local AMS Vite preview (HTTP).
# Requires a root .env (copy from .env.example). Then:
#   docker compose up --build
# App listens on http://localhost:10000

services:
  ams-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams-website
    working_dir: /app
    ports:
      - "10000:10000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "10000"
      # Force HTTP so a host .env with HTTPS=true does not break the container listener.
      HTTPS: "false"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - ams_node_modules:/app/node_modules
    command: >
      sh -c "npm ci && npm start -- --host 0.0.0.0 --port 10000"
    restart: unless-stopped

volumes:
  ams_node_modules:
