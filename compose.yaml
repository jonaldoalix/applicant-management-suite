# Dockge / docker compose stack for temporary local spin-up of AMS (Vite).
# Uses port 3001 so it can run beside PF on 3000.
#
# Import this folder in Dockge on fsb-01, or: docker compose up --build

services:
  ams-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams-website
    working_dir: /app
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "3001"
      HTTPS: "false"
      SSL_CRT_FILE: "./localhost+2.pem"
      SSL_KEY_FILE: "./localhost+2-key.pem"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - ams_node_modules:/app/node_modules
    command: >
      sh -c "npm ci && npm start -- --host 0.0.0.0 --port 3001"
    restart: unless-stopped

volumes:
  ams_node_modules:
