# Dockge / Compose — AMS Vite preview (HTTP).
# Intended path for a WORKING demo: clone private ams-demo (includes .env), then:
#   docker compose up --build
# Point Nginx Proxy Manager at host:10000.
#
# Public clones need a root .env (see README / .env.example). Compose will not start cleanly without it.

services:
  ams-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams-website
    working_dir: /app
    ports:
      - "10000:10000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "10000"
      # Force HTTP so host .env HTTPS=true never breaks the container listener for NPM.
      HTTPS: "false"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - ams_node_modules:/app/node_modules
    command: >
      sh -c "npm ci && npm start -- --host 0.0.0.0 --port 10000"
    restart: unless-stopped

volumes:
  ams_node_modules:
